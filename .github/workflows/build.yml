name: Build Windows EXE
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Build EXE with PyInstaller
        run: pyinstaller --onefile --windowed --name Apomagnhtophonisi --icon microphone.ico --add-data policegreek.jpg;. main.py
      - name: Upload EXE as artifact
        uses: actions/upload-artifact@v4
        with:
          name: Apomagnhtophonisi-Windows
          path: dist/Apomagnhtophonisi.exe
